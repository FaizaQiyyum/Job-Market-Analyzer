<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Market Analyzer</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <header>
        <h1>Job Market Analyzer</h1>
        <div id="loader" class="loader">Analyzing data...</div>
    </header>

    <main>
        <!-- Data Controls -->
        <section class="upload-section">
            <div class="upload-controls">
                <input type="file" id="csvFile" accept=".csv" />
                <button id="analyzeBtn" class="btn btn-primary">Analyze CSV</button>
                <span style="color: var(--text-secondary)">or</span>
                <button id="sampleBtn" class="btn btn-secondary">Use Sample Data</button>
            </div>
            <div class="actions">
                <button id="downloadBtn" class="btn btn-secondary hidden">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    Download JSON Report
                </button>
            </div>
        </section>

        <div id="dashboard" class="hidden">
            <!-- Summary stats -->
            <section class="summary-cards">
                <div class="card">
                    <h3>Total Jobs Processed</h3>
                    <div class="value" id="valTotalJobs">0</div>
                </div>
                <div class="card">
                    <h3>Unique Titles Found</h3>
                    <div class="value" id="valUniqueTitles">0</div>
                </div>
                <div class="card">
                    <h3>Companies Analyzed</h3>
                    <div class="value" id="valCompanies">0</div>
                </div>
            </section>

            <!-- Charts Section -->
            <section class="charts-grid">
                <div class="chart-container">
                    <h3>Top 10 In-Demand Job Titles</h3>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="jobTitlesChart"></canvas>
                    </div>
                </div>
                <div class="chart-container">
                    <h3>Experience Level Breakdown</h3>
                    <div style="position: relative; height: 300px; width: 100%;">
                        <canvas id="experienceChart"></canvas>
                    </div>
                </div>
            </section>

            <!-- Lists Section -->
            <section class="lists-grid">
                <div class="list-container">
                    <h3>Most Required Skills</h3>
                    <ul id="skillsList" class="data-list"></ul>
                </div>
                <div class="list-container">
                    <h3>Top Hiring Companies</h3>
                    <ul id="companiesList" class="data-list"></ul>
                </div>
                <div class="list-container" style="grid-column: 1 / -1;">
                    <h3>Job Distribution by Location</h3>
                    <div style="position: relative; height: 300px; width: 100%; display: flex; justify-content: center;">
                        <canvas id="locationChart"></canvas>
                    </div>
                </div>
            </section>
        </div>
    </main>

    <script src="/static/js/app.js"></script>
</body>
</html>
